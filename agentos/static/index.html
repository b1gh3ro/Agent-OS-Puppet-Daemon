<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agentos</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e2230; --border: #2a2f3d;
    --text: #d7dae2; --dim: #8a90a0; --accent: #6ea8fe; --ok: #4ade80;
    --warn: #fbbf24; --err: #f87171; --purple: #c084fc;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text); height: 100vh;
    font: 14px/1.45 system-ui, sans-serif; display: flex; flex-direction: column;
  }
  code, .mono { font-family: ui-monospace, monospace; }

  header {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { font-size: 15px; font-weight: 600; }
  #health-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--err); }
  #health-dot.ok { background: var(--ok); }
  #brain-name { color: var(--dim); font-size: 12px; }

  main { flex: 1; display: flex; min-height: 0; }
  #sidebar {
    width: 330px; flex-shrink: 0; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; background: var(--panel);
  }
  #new-task { padding: 12px; border-bottom: 1px solid var(--border); }
  #new-task textarea {
    width: 100%; height: 56px; resize: vertical; background: var(--panel2);
    color: var(--text); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px; font: inherit;
  }
  #new-task .row { display: flex; gap: 8px; margin-top: 8px; }
  #new-task input {
    width: 50%; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 7px; font: inherit;
  }
  button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: .4; cursor: default; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0b1020; font-weight: 600; }
  button.danger:hover:not(:disabled) { border-color: var(--err); color: var(--err); }

  #task-list { flex: 1; overflow-y: auto; }
  .task-row {
    padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer;
    display: flex; flex-direction: column; gap: 3px;
  }
  .task-row:hover { background: var(--panel2); }
  .task-row.selected { background: var(--panel2); box-shadow: inset 3px 0 0 var(--accent); }
  .task-row .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .task-row .goal { color: var(--dim); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge {
    font-size: 11px; padding: 1px 8px; border-radius: 999px; border: 1px solid;
    text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0;
  }
  .badge.pending   { color: var(--dim);    border-color: var(--dim); }
  .badge.running   { color: var(--accent); border-color: var(--accent); }
  .badge.done      { color: var(--ok);     border-color: var(--ok); }
  .badge.failed    { color: var(--err);    border-color: var(--err); }
  .badge.cancelled { color: var(--dim);    border-color: var(--dim); text-decoration: line-through; }
  .badge.paused    { color: var(--warn);   border-color: var(--warn); }

  #detail { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #placeholder { margin: auto; color: var(--dim); }
  #detail-head { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  #detail-goal { font-weight: 600; margin-bottom: 6px; }
  #detail-meta { color: var(--dim); font-size: 12px; display: flex; gap: 14px; flex-wrap: wrap; }
  #wait-banner { display: none; margin-top: 10px; padding: 12px 14px; border-radius: 8px;
    background: rgba(251,191,36,.12); border: 1px solid var(--warn); }
  #wait-banner.show { display: block; }
  #wait-banner .title { color: var(--warn); font-weight: 600; margin-bottom: 4px; }
  #wait-banner .msg { white-space: pre-wrap; margin-bottom: 10px; }
  #wait-banner button { background: var(--warn); border-color: var(--warn); color: #1a1200; font-weight: 600; }
  #detail-result {
    margin-top: 8px; padding: 8px 10px; border-radius: 6px; background: var(--panel2);
    font-size: 13px; white-space: pre-wrap; display: none;
    max-height: 35vh; overflow-y: auto; /* long answers scroll instead of pushing the UI down */
    resize: vertical; min-height: 40px; /* drag the bottom edge to any size */
  }
  #detail-result.error { color: var(--err); }

  #controls { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); align-items: center; }
  #guidance-text {
    flex: 1; background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 9px; font: inherit;
  }

  #tabs { display: flex; gap: 4px; padding: 8px 16px 0; border-bottom: 1px solid var(--border); }
  #tabs button { border: none; border-bottom: 2px solid transparent; border-radius: 0; background: none; color: var(--dim); }
  #tabs button.active { color: var(--text); border-bottom-color: var(--accent); }

  #panes { flex: 1; min-height: 0; display: flex; }
  .pane { flex: 1; display: none; min-height: 0; }
  .pane.active { display: flex; }

  #feed { flex-direction: column; overflow-y: auto; padding: 10px 16px; gap: 2px; }
  .ev { display: flex; gap: 10px; padding: 3px 0; font-size: 13px; }
  .ev .step { color: var(--dim); width: 34px; flex-shrink: 0; text-align: right; }
  .ev .kind { width: 88px; flex-shrink: 0; color: var(--dim); }
  .ev .body { white-space: pre-wrap; word-break: break-word; }
  .ev.action .kind { color: var(--accent); }
  .ev.guidance { background: rgba(192,132,252,.08); border-radius: 4px; }
  .ev.guidance .kind { color: var(--purple); }
  .ev.action_result { background: rgba(110,168,254,.06); border-radius: 4px; }
  .ev.action_result .body { font-family: ui-monospace, monospace; font-size: 12px; }
  .ev.paused .kind, .ev.resumed .kind, .ev.wait_for_user .kind, .ev.blocked_pause .kind { color: var(--warn); }
  .ev.wait_for_user, .ev.blocked_pause { background: rgba(251,191,36,.08); border-radius: 4px; }
  .ev.action_error .kind, .ev.final-failed .kind, .ev.empty_response .kind { color: var(--err); }
  .ev.done .kind, .ev.final-done .kind { color: var(--ok); }

  #shot { align-items: center; justify-content: center; background: #000; }
  #shot img { max-width: 100%; max-height: 100%; }
  #shot .none { color: var(--dim); }
  #desktop iframe { flex: 1; border: none; }
</style>
</head>
<body>

<header>
  <div id="health-dot"></div>
  <h1>agentos</h1>
  <span id="brain-name"></span>
</header>

<main>
  <div id="sidebar">
    <form id="new-task">
      <textarea id="goal" placeholder="What should the agent do?" required></textarea>
      <div class="row">
        <input id="max-steps" type="number" min="1" value="300" title="max steps">
        <input id="timeout" type="number" min="10" value="3600" title="timeout (s)">
        <button type="submit" class="primary">Run</button>
      </div>
    </form>
    <div id="task-list"></div>
  </div>

  <div id="detail">
    <div id="placeholder">Select a task — or submit one.</div>
    <div id="detail-body" style="display:none; flex:1; flex-direction:column; min-height:0;">
      <div id="detail-head">
        <div id="detail-goal"></div>
        <div id="detail-meta"></div>
        <div id="wait-banner"></div>
        <div id="detail-result"></div>
      </div>
      <div id="controls">
        <button id="btn-pause">Pause</button>
        <button id="btn-cancel" class="danger">Cancel</button>
        <input id="guidance-text" placeholder="Steer the agent: e.g. 'use the search bar instead'">
        <button id="btn-guide">Send</button>
      </div>
      <div id="tabs">
        <button data-pane="feed" class="active">Activity</button>
        <button data-pane="shot">Screenshot</button>
        <button data-pane="desktop">Live desktop</button>
      </div>
      <div id="panes">
        <div id="feed" class="pane active"></div>
        <div id="shot" class="pane"><span class="none">No screenshot yet.</span></div>
        <div id="desktop" class="pane"></div>
      </div>
    </div>
  </div>
</main>

<script>
const NOVNC_URL = "http://localhost:6080/vnc.html?autoconnect=1&resize=scale";
const TERMINAL = new Set(["done", "failed", "cancelled"]);
const state = { selectedId: null, cursor: 0, tasks: [], lastShot: null, stick: true };
const $ = id => document.getElementById(id);

async function api(path, opts) {
  const resp = await fetch(path, opts);
  if (!resp.ok) throw new Error(await resp.text());
  return resp.json();
}
const post = (path, body) => api(path, {
  method: "POST",
  headers: body ? { "content-type": "application/json" } : {},
  body: body ? JSON.stringify(body) : undefined,
});

// ---- header health ---------------------------------------------------------
async function pollHealth() {
  try {
    const h = await api("/health");
    $("health-dot").classList.add("ok");
    $("brain-name").textContent = `${h.brain} · ${h.queued} queued`;
  } catch (e) {
    $("health-dot").classList.remove("ok");
    $("brain-name").textContent =
      location.protocol === "file:"
        ? "opened as a file — go to http://localhost:8420 instead"
        : `daemon unreachable at ${location.origin} — ${e.message}`;
  }
}

// ---- task list -------------------------------------------------------------
function badge(t) {
  if (!TERMINAL.has(t.status) && (t.paused || t.pause_requested))
    return `<span class="badge paused">${t.paused ? "paused" : "pausing…"}</span>`;
  return `<span class="badge ${t.status}">${t.status}</span>`;
}

async function pollTasks() {
  try { state.tasks = await api("/tasks"); } catch { return; }
  if (!state.selectedId && state.tasks.length)
    return selectTask(state.tasks[state.tasks.length - 1].id); // newest first
  const rows = [...state.tasks].reverse().map(t => `
    <div class="task-row ${t.id === state.selectedId ? "selected" : ""}" data-id="${t.id}">
      <div class="top">
        <span class="mono">${t.id}</span>
        <span class="dim mono" style="color:var(--dim);font-size:12px">${t.steps_taken}/${t.max_steps}</span>
        ${badge(t)}
      </div>
      <div class="goal"></div>
    </div>`).join("");
  $("task-list").innerHTML = rows;
  // Goals are user text: set via textContent, never innerHTML.
  const reversed = [...state.tasks].reverse();
  document.querySelectorAll("#task-list .goal").forEach((el, i) => {
    el.textContent = reversed[i].goal;
  });
  if (state.selectedId) renderDetail();
}
$("task-list").addEventListener("click", e => {
  const row = e.target.closest(".task-row");
  if (row) selectTask(row.dataset.id);
});

// ---- new task --------------------------------------------------------------
$("new-task").addEventListener("submit", async e => {
  e.preventDefault();
  const goal = $("goal").value.trim();
  if (!goal) return;
  let t;
  try {
    t = await post("/tasks", {
      goal,
      max_steps: +$("max-steps").value || 300,
      timeout_seconds: +$("timeout").value || 3600,
    });
  } catch (e) {
    alert(`Could not submit task: ${e.message}`);
    return;
  }
  $("goal").value = "";
  await pollTasks();
  selectTask(t.id);
});

// ---- selection + detail ----------------------------------------------------
function selectTask(id) {
  if (state.selectedId === id) return;
  state.selectedId = id;
  state.cursor = 0;
  state.lastShot = null;
  state.stick = true;
  $("feed").innerHTML = "";
  $("shot").innerHTML = '<span class="none">No screenshot yet.</span>';
  $("placeholder").style.display = "none";
  $("detail-body").style.display = "flex";
  renderDetail();
  pollTasks();
  pollFeed();
}

function fmtTime(ts) { return ts ? new Date(ts * 1000).toLocaleTimeString() : "—"; }

function renderDetail() {
  const t = state.tasks.find(x => x.id === state.selectedId);
  if (!t) return;
  $("detail-goal").textContent = t.goal;
  $("detail-meta").innerHTML = `
    <span class="mono">${t.id}</span>
    <span>${badge(t)}</span>
    <span>step ${t.steps_taken}/${t.max_steps}</span>
    <span>started ${fmtTime(t.created_at)}</span>
    <span>finished ${fmtTime(t.finished_at)}</span>
    ${t.pending_guidance ? `<span style="color:var(--purple)">${t.pending_guidance} guidance pending</span>` : ""}`;

  const wb = $("wait-banner");
  if (t.wait_message && !TERMINAL.has(t.status)) {
    const sleeping = t.wait_kind === "sleep";
    const title = sleeping ? "⏳ The agent is sleeping" : "⏸ The agent is waiting for you";
    const label = sleeping ? "Skip the wait — continue now" : "I've done it — Resume";
    wb.classList.add("show");
    wb.innerHTML = `<div class="title">${title}</div>
      <div class="msg"></div><button id="wait-resume"></button>`;
    wb.querySelector(".msg").textContent = t.wait_message;
    wb.querySelector("#wait-resume").textContent = label;
    wb.querySelector("#wait-resume").onclick =
      () => post(`/tasks/${t.id}/resume`).then(pollTasks);
  } else {
    wb.classList.remove("show");
    wb.innerHTML = "";
  }

  const res = $("detail-result");
  // The 35vh max-height is only the *default* cap; once the user grabs the
  // resize handle, lift it so the box can be dragged as tall as they like.
  res.onpointerdown = () => { res.style.maxHeight = "none"; };
  if (t.result || t.error) {
    res.style.display = "block";
    res.classList.toggle("error", !!t.error);
    res.textContent = t.error || t.result;
  } else res.style.display = "none";

  const terminal = TERMINAL.has(t.status);
  $("btn-cancel").disabled = terminal || t.cancel_requested;
  $("btn-pause").disabled = terminal;
  $("btn-pause").textContent = (t.pause_requested || t.paused) ? "Resume" : "Pause";
  // On a finished task the text box turns into a follow-up prompt: the run
  // continues in the same session, with the model's history intact.
  $("btn-guide").textContent = terminal ? "Continue" : "Send";
  $("guidance-text").placeholder = terminal
    ? "Continue the task: e.g. 'now also reply to their last message'"
    : "Steer the agent: e.g. 'use the search bar instead'";
}

// ---- controls --------------------------------------------------------------
$("btn-cancel").onclick = () => post(`/tasks/${state.selectedId}/cancel`).then(pollTasks);
$("btn-pause").onclick = () => {
  const t = state.tasks.find(x => x.id === state.selectedId);
  const action = (t.pause_requested || t.paused) ? "resume" : "pause";
  post(`/tasks/${state.selectedId}/${action}`).then(pollTasks);
};
async function sendGuidance() {
  const text = $("guidance-text").value.trim();
  if (!text) return;
  const t = state.tasks.find(x => x.id === state.selectedId);
  if (t && TERMINAL.has(t.status)) {
    await post(`/tasks/${state.selectedId}/continue`, { goal: text });
  } else {
    await post(`/tasks/${state.selectedId}/guidance`, { text });
  }
  $("guidance-text").value = "";
  pollTasks();
}
$("btn-guide").onclick = sendGuidance;
$("guidance-text").addEventListener("keydown", e => { if (e.key === "Enter") sendGuidance(); });

// ---- activity feed ---------------------------------------------------------
function evBody(e) {
  switch (e.kind) {
    case "start": return e.goal;
    case "action": {
      const { intent, ...rest } = e.args || {};
      const extra = Object.keys(rest).length ? ` ${JSON.stringify(rest)}` : "";
      return `${e.name}${extra}${intent ? ` — ${intent}` : ""}`;
    }
    case "guidance": return e.text;
    case "wait_for_user": return e.message;
    case "sleep": return `sleeping ~${Math.round(e.seconds)}s${e.reason ? ` (${e.reason})` : ""}`;
    case "sleep_woken": return `woken early after ${e.after}s`;
    case "wait_for_change": return `waiting up to ${Math.round(e.timeout)}s for the screen to change${e.reason ? ` (${e.reason})` : ""}`;
    case "screen_changed": return `screen changed after ${e.after}s`;
    case "wait_woken": return `operator skipped the wait after ${e.after}s`;
    case "action_result": {
      const out = (e.output || "").trim();
      return `exit ${e.exit_code}${out ? `\n${out}` : ""}`;
    }
    case "action_error": return `${e.name}: ${e.error}`;
    case "empty_response": return `model returned nothing (${e.detail}); retrying`;
    case "blocked_pause": return `Google blocked ${e.streak} turns in a row — paused for you to help`;
    case "done": case "budget_synthesis": return e.result || "";
    case "final": return `${e.status}${e.error ? ` — ${e.error}` : ""}`;
    case "screenshot": return null; // rendered in the Screenshot tab instead
    default: return "";
  }
}

function renderEvent(e) {
  if (e.kind === "screenshot") {
    state.lastShot = e.path.split("/").pop();
    return;
  }
  const body = evBody(e);
  if (body === null) return;
  const div = document.createElement("div");
  div.className = `ev ${e.kind}${e.kind === "final" ? `-${e.status}` : ""}`;
  const step = document.createElement("span"); step.className = "step mono"; step.textContent = e.step;
  const kind = document.createElement("span"); kind.className = "kind"; kind.textContent = e.kind;
  const text = document.createElement("span"); text.className = "body"; text.textContent = body;
  div.append(step, kind, text);
  $("feed").appendChild(div);
}

async function pollFeed() {
  if (!state.selectedId) return;
  const id = state.selectedId;
  let data;
  try { data = await api(`/tasks/${id}/steps?after=${state.cursor}`); } catch { return; }
  if (id !== state.selectedId) return; // task switched mid-fetch
  if (data.events.length) {
    const feed = $("feed");
    state.stick = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 40;
    data.events.forEach(renderEvent);
    state.cursor = data.next;
    if (state.stick) feed.scrollTop = feed.scrollHeight;
    refreshShot();
  }
}

function refreshShot() {
  if (!state.lastShot) return;
  $("shot").innerHTML =
    `<img src="/runs/${state.selectedId}/${state.lastShot}?t=${Date.now()}" alt="latest screenshot">`;
}

// ---- tabs ------------------------------------------------------------------
document.querySelectorAll("#tabs button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b === btn));
    document.querySelectorAll(".pane").forEach(p => p.classList.toggle("active", p.id === btn.dataset.pane));
    if (btn.dataset.pane === "desktop" && !$("desktop").firstChild) {
      const frame = document.createElement("iframe");
      frame.src = NOVNC_URL;
      $("desktop").appendChild(frame); // lazy: only connect VNC when viewed
    }
    if (btn.dataset.pane === "shot") refreshShot();
  };
});

// ---- boot ------------------------------------------------------------------
pollHealth(); pollTasks();
setInterval(pollHealth, 5000);
setInterval(pollTasks, 1500);
setInterval(pollFeed, 1500);
</script>
</body>
</html>
